version: 0.2.0
description: >
  Marker registry for the autonomous-loop scheduler. Every catalog action that
  posts to GitHub has exactly one primary state marker. Markers are parsed by
  simulation/tools/validator.py and simulation/tools/marker_registry.py. The
  enum in `values` is strict; anything else logs a warning and the marker is
  treated as malformed.

markers:
  review_pr:
    marker: REVIEW-VERDICT
    values: [APPROVE, APPROVE_WITH_CONDITIONS, REQUEST_CHANGES, CHANGES_REQUESTED, BLOCKED, BLOCK, DEFER, PROPOSE, REJECT, COMMENT, ABSTAIN]
    regex: '(?im)^REVIEW-VERDICT:\s*(APPROVE_WITH_CONDITIONS|APPROVE|CHANGES_REQUESTED|REQUEST_CHANGES|BLOCKED|BLOCK|DEFER|PROPOSE|REJECT|COMMENT|ABSTAIN)\b'
    terminal: false
    meaning: PR review verdict from a persona.
    transitions:
      APPROVE: merge_gate
      APPROVE_WITH_CONDITIONS: merge_gate
      REQUEST_CHANGES: address_changes_requested
      BLOCKED: address_changes_requested

  address_changes_requested:
    marker: ADDRESS-CHANGES
    values: [POSTED, BLOCKED]
    regex: '(?im)^ADDRESS-CHANGES:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Author replied to blocking review.

  merge_gate:
    marker: RHEA-VERDICT
    values: [MERGE_READY, BLOCKED, HOLD]
    regex: '(?im)^RHEA-VERDICT:\s*(MERGE_READY|BLOCKED|HOLD)\b'
    terminal: false
    meaning: Release-gate verdict from Rhea.

  merge_pr:
    marker: MERGE-STATUS
    values: [COMPLETE, FAILED, SKIPPED]
    regex: '(?im)^MERGE-STATUS:\s*(COMPLETE|FAILED|SKIPPED)\b'
    terminal: false
    meaning: Outcome of an attempted merge.
    transitions:
      COMPLETE: close_issue
      FAILED: retry_merge
      SKIPPED: post_status_and_exit

  migrate_persona:
    marker: PERSONA-MIGRATION
    values: [PR_OPENED, BLOCKED]
    regex: '(?im)^PERSONA-MIGRATION:\s*(PR_OPENED|BLOCKED)\b'
    terminal: false
    meaning: New persona prompt opened as a risk:high PR.

  implement_scenario:
    marker: SCENARIO-IMPLEMENTATION
    values: [PR_OPENED, BLOCKED]
    regex: '(?im)^SCENARIO-IMPLEMENTATION:\s*(PR_OPENED|BLOCKED)\b'
    terminal: false
    meaning: Missing scenario emitted as a PR.

  triage_issue:
    marker: TRIAGE-DECISION
    values: [READY_FOR_AGENT, NEEDS_TRIAGE, BLOCKED, DEFER]
    regex: '(?im)^TRIAGE-DECISION:\s*(READY_FOR_AGENT|NEEDS_TRIAGE|BLOCKED|DEFER)\b'
    terminal: false
    meaning: Issue triage verdict.

  implement_issue:
    marker: IMPLEMENTATION-COMPLETE
    values: ["TRUE", "FALSE", "FAILED"]
    regex: '(?im)^IMPLEMENTATION-COMPLETE:\s*(TRUE|FALSE|FAILED)\b'
    terminal: false
    meaning: Whether implementation produced an open PR.
    transitions:
      TRUE: review_pr
      FALSE: address_changes_requested
      FAILED: retry_implementation

  prompt_improvement:
    marker: PROMPT-PATCH
    values: [PR_OPENED, BLOCKED]
    regex: '(?im)^PROMPT-PATCH:\s*(PR_OPENED|BLOCKED)\b'
    terminal: false
    meaning: Prompt defect patched and opened as PR.

  run_prompt_regression:
    marker: VALIDATION-RESULT
    values: [PASS, FAIL, SKIPPED]
    regex: '(?im)^VALIDATION-RESULT:\s*(PASS|FAIL|SKIPPED)\b'
    terminal: false
    meaning: Outcome of a regression suite run.

  run_audit:
    marker: AUDIT-STATUS
    values: [PASS, FAIL, PARTIAL]
    regex: '(?im)^AUDIT-STATUS:\s*(PASS|FAIL|PARTIAL)\b'
    terminal: false
    meaning: Outcome of an audit run posted on the target issue.

  security_audit:
    marker: SECURITY-AUDIT
    values: [POSTED, BLOCKED]
    regex: '(?im)^SECURITY-AUDIT:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Security threat model posted.

  cost_review:
    marker: COST-REVIEW
    values: [POSTED, BLOCKED]
    regex: '(?im)^COST-REVIEW:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Cost review evidence posted.

  comment_discussion:
    marker: DISCUSSION-STATE
    values: [OPEN, RESOLVED, PROMOTED, DEFERRED, CLOSED]
    regex: '(?im)^DISCUSSION-STATE:\s*(OPEN|RESOLVED|PROMOTED|DEFERRED|CLOSED)\b'
    terminal: false
    meaning: Discussion lifecycle state after the comment.

  generate_ideas:
    marker: IDEAS-POSTED
    values: ["TRUE", "FALSE"]
    regex: '(?im)^IDEAS-POSTED:\s*(TRUE|FALSE)\b'
    terminal: false
    meaning: Idea batch posted in the Idea Lab.

  promote_idea:
    marker: IDEA-PROMOTION
    values: [ISSUE_OPENED, BLOCKED]
    regex: '(?im)^IDEA-PROMOTION:\s*(ISSUE_OPENED|BLOCKED)\b'
    terminal: false
    meaning: Idea promoted into a tracked issue.

  open_followup_issue:
    marker: FOLLOWUP-ISSUE
    values: [OPENED, BLOCKED]
    regex: '(?im)^FOLLOWUP-ISSUE:\s*(OPENED|BLOCKED)\b'
    terminal: false
    meaning: Follow-up issue created from a review/audit.

  decision_record:
    marker: DECISION-RECORDED
    values: [POSTED]
    regex: '(?im)^DECISION-RECORDED:\s*(POSTED)\b'
    terminal: false
    meaning: Decision record posted on a risk:high+ change.

  retrospective:
    marker: RETRO-FINDING
    values: [POSTED]
    regex: '(?im)^RETRO-FINDING:\s*(POSTED)\b'
    terminal: false
    meaning: Retrospective finding posted.

  knowledge_update:
    marker: KNOWLEDGE-UPDATE
    values: [PR_OPENED, BLOCKED]
    regex: '(?im)^KNOWLEDGE-UPDATE:\s*(PR_OPENED|BLOCKED)\b'
    terminal: false
    meaning: Durable doc/wiki update opened.

  re_ratification:
    marker: RERATIFICATION
    values: [RATIFY, AMEND, ROLLBACK]
    regex: '(?im)^RERATIFICATION:\s*(RATIFY|AMEND|ROLLBACK)\b'
    terminal: false
    meaning: Operating-model re-ratification outcome.

  accept_pr:
    marker: ACCEPTANCE-DECISION
    values: [ACCEPT, HOLD, REJECT]
    regex: '(?im)^ACCEPTANCE-DECISION:\s*(ACCEPT|HOLD|REJECT)\b'
    terminal: false
    meaning: Final acceptance decision before merge or reject.
    transitions:
      ACCEPT: merge_pr
      HOLD: post_status_and_exit
      REJECT: reject_pr

  reject_pr:
    marker: PR-STATE
    values: [MERGED, REJECTED, CLOSED]
    regex: '(?im)^PR-STATE:\s*(MERGED|REJECTED|CLOSED)\b'
    terminal: true
    meaning: Terminal PR state after close/merge.

  create_issue:
    marker: ISSUE-STATE
    values: [CREATED, REOPENED]
    regex: '(?im)^ISSUE-STATE:\s*(CREATED|REOPENED)\b'
    terminal: false
    meaning: A new (or reopened) tracked issue exists.

  close_issue:
    marker: ISSUE-CLOSED
    values: [DONE, REJECTED, DUPLICATE, UNRESOLVED, TIMEOUT, INACTIVE]
    regex: '(?im)^ISSUE-CLOSED:\s*(DONE|REJECTED|DUPLICATE|UNRESOLVED|TIMEOUT|INACTIVE)\b'
    terminal: true
    meaning: Issue closed with terminal reason.

  create_milestone:
    marker: MILESTONE-STATE
    values: [CREATED, ASSIGNED, CLOSED]
    regex: '(?im)^MILESTONE-STATE:\s*(CREATED|ASSIGNED|CLOSED)\b'
    terminal: false
    meaning: Milestone lifecycle transition.

  assign_milestone:
    marker: MILESTONE-ASSIGNMENT
    values: [ASSIGNED, BLOCKED]
    regex: '(?im)^MILESTONE-ASSIGNMENT:\s*(ASSIGNED|BLOCKED)\b'
    terminal: false
    meaning: Issue assigned to a milestone.

  close_milestone:
    marker: MILESTONE-CLOSED
    values: [CLOSED, SKIPPED]
    regex: '(?im)^MILESTONE-CLOSED:\s*(CLOSED|SKIPPED)\b'
    terminal: true
    meaning: Milestone closed because all issues are done.

  post_status_and_exit:
    marker: LOOP-STATUS
    values: [NO_WORK, BLOCKED]
    regex: '(?im)^LOOP-STATUS:\s*(NO_WORK|BLOCKED)\b'
    terminal: false
    meaning: Scheduler reports no actionable work this tick.

  skip:
    marker: LOOP-SKIP
    values: [SATURATED, COOLDOWN]
    regex: '(?im)^LOOP-SKIP:\s*(SATURATED|COOLDOWN)\b'
    terminal: false
    meaning: Loop deliberately skipped this tick.

  design_solution:
    marker: DESIGN-APPROVAL
    values: [APPROVE, REQUEST_CHANGES, BLOCKED]
    regex: '(?im)^DESIGN-APPROVAL:\s*(APPROVE|REQUEST_CHANGES|BLOCKED)\b'
    terminal: false
    meaning: Verdict on a design proposal.
    transitions:
      APPROVE: implement_issue
      REQUEST_CHANGES: design_solution
      BLOCKED: address_changes_requested

  retry_implementation:
    marker: RETRY-IMPLEMENTATION
    values: [QUEUED, EXHAUSTED]
    regex: '(?im)^RETRY-IMPLEMENTATION:\s*(QUEUED|EXHAUSTED)\b'
    terminal: false
    meaning: Implementation retry scheduled or exhausted.

  retry_merge:
    marker: RETRY-MERGE
    values: [QUEUED, EXHAUSTED]
    regex: '(?im)^RETRY-MERGE:\s*(QUEUED|EXHAUSTED)\b'
    terminal: false
    meaning: Merge retry scheduled or exhausted.

  request_clarification:
    marker: CLARIFICATION-REQUEST
    values: [POSTED]
    regex: '(?im)^CLARIFICATION-REQUEST:\s*(POSTED)\b'
    terminal: false
    meaning: Unknown marker triggered a clarification ask.

  consistency_check:
    marker: CONSISTENCY-CHECK
    values: [PASS, FIXED, BLOCKED]
    regex: '(?im)^CONSISTENCY-CHECK:\s*(PASS|FIXED|BLOCKED)\b'
    terminal: false
    meaning: Outcome of the cross-state consistency sweep.

  facilitate_planning:
    marker: PLAN-READY
    values: [POSTED, BLOCKED]
    regex: '(?im)^PLAN-READY:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Facilitated discussion is ready to be promoted to issues.

  promote_to_issues:
    marker: PROMOTION-COMPLETE
    values: [POSTED, BLOCKED]
    regex: '(?im)^PROMOTION-COMPLETE:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Plan was promoted to milestone + issues + (optional) project card.

  validate_plan:
    marker: PLAN-STATUS
    values: [DRAFT, APPROVED, IMPLEMENTING, DONE, REJECTED]
    regex: '(?im)^PLAN-STATUS:\s*(DRAFT|APPROVED|IMPLEMENTING|DONE|REJECTED)\b'
    terminal: false
    meaning: Plan lifecycle gate decision posted on the plan issue.

  implement_with_ac:
    marker: AC-COVERAGE
    values: [POSTED, BLOCKED]
    regex: '(?im)^AC-COVERAGE:\s*(POSTED|BLOCKED)\b'
    terminal: false
    meaning: Implementer documented coverage for every AC and opened a PR.

  verify_implementation:
    marker: AC-DONE
    values: [ALL, PARTIAL, FAILED]
    regex: '(?im)^AC-DONE:\s*(ALL|PARTIAL|FAILED)\b'
    terminal: false
    meaning: Post-merge AC verification result.

  close_plan:
    marker: RELEASE-NOTES
    values: [POSTED, BLOCKED]
    regex: '(?im)^RELEASE-NOTES:\s*(POSTED|BLOCKED)\b'
    terminal: true
    meaning: "Final close of a plan: milestone closed, release notes posted."

  # CHAIN-NEXT is intentionally not registered — it has no catalog action;
  # see simulation/tools/loop_speedup.parse_chain_next for the parser.

# Persona request markers (INPUT markers, not action outputs).
#
# Unlike the entries under `markers:` above — each the *output* state marker of
# one catalog action — these are markers a persona *writes into* an issue/PR
# body to pull other personas into the loop. They have no catalog action of
# their own, so they live in their own section to keep
# marker_registry.validate_catalog_coverage() (action <-> marker 1:1) green.
# Parsed by simulation/tools/state_fetcher.has_request_marker and
# simulation/tools/plan_builder._parse_requests; surfaced as the priority-0
# UNANSWERED_REQUEST problem in simulation/tools/state_analyzer.
request_markers:
  REQUEST-REPLY-FROM:
    marker: REQUEST-REPLY-FROM
    regex: '(?im)^REQUEST-REPLY-FROM:\s*@?[a-z0-9-]+(?:\s*,\s*@?[a-z0-9-]+)*'
    terminal: false
    meaning: Request one or more named personas to reply to this issue/PR/discussion.

  REQUEST-REVIEW-FROM:
    marker: REQUEST-REVIEW-FROM
    regex: '(?im)^REQUEST-REVIEW-FROM:\s*@?[a-z0-9-]+'
    terminal: false
    meaning: Request a named persona to review a PR.

  REQUEST-APPROVAL-FROM:
    marker: REQUEST-APPROVAL-FROM
    regex: '(?im)^REQUEST-APPROVAL-FROM:\s*@?[a-z0-9-]+'
    terminal: false
    meaning: Request approval from a named persona (plan, merge, etc.).

  QUESTION-TO:
    marker: QUESTION-TO
    regex: '(?im)^QUESTION-TO:\s*@?[a-z0-9-]+\?.*'
    terminal: false
    meaning: Pose a specific question to a named persona.

# Collaboration markers (debate / clarification / escalation / decisions).
#
# Like request_markers, these are written *into* issue/PR/discussion bodies and
# comments to drive multi-persona collaboration; they have no catalog action of
# their own, so they live outside the action<->marker `markers:` map (keeping
# marker_registry.validate_catalog_coverage green). Parsed by
# simulation/tools/marker_registry.collaboration_marker_names and validated by
# simulation/tools/agent_output_validator.validate_collaboration_markers.
# Detected as new planner problems in simulation/tools/state_analyzer
# (unanswered_request_info, unresolved_debate, review_deadlock).
collaboration_markers:
  REQUEST-INFO:
    marker: REQUEST-INFO
    regex: '(?im)^REQUEST-INFO:\s*\S.*'
    terminal: false
    meaning: Ask a clarifying question that blocks progress until answered.

  RESPONSE:
    marker: RESPONSE
    regex: '(?im)^RESPONSE:\s*\S.*'
    terminal: false
    meaning: Answer to a REQUEST-INFO, unblocking progress.

  ARGUMENT:
    marker: ARGUMENT
    regex: '(?im)^ARGUMENT:\s*\S.*'
    terminal: false
    meaning: Reasoned position in a design debate.

  COUNTER-PROPOSAL:
    marker: COUNTER-PROPOSAL
    regex: '(?im)^COUNTER-PROPOSAL:\s*\S.*'
    terminal: false
    meaning: Alternative to a previous proposal (must reference it).

  REBUTTAL:
    marker: REBUTTAL
    regex: '(?im)^REBUTTAL:\s*\S.*'
    terminal: false
    meaning: Reasoned disagreement with a prior position.

  EVIDENCE:
    marker: EVIDENCE
    regex: '(?im)^EVIDENCE:\s*\S.*'
    terminal: false
    meaning: Supporting data, benchmarks, or citations.

  RESOLUTION:
    marker: RESOLUTION
    regex: '(?im)^RESOLUTION:\s*\S.*'
    terminal: true
    meaning: Final decision after a debate (approved/vetoed by a persona).

  OBJECTION:
    marker: OBJECTION
    regex: '(?im)^OBJECTION:\s*\S.*'
    terminal: false
    meaning: Formal objection to a review or merge.

  ESCALATION:
    marker: ESCALATION
    regex: '(?im)^ESCALATION:\s*\S.*'
    terminal: false
    meaning: Request a higher-authority (Lead) persona to decide.

  EXPLANATION:
    marker: EXPLANATION
    regex: '(?im)^EXPLANATION:\s*\S.*'
    terminal: false
    meaning: Detailed explanation of a design or code block (durable doc).

  DECISION-FROM-LEAD:
    marker: DECISION-FROM-LEAD
    regex: '(?im)^DECISION-FROM-LEAD:\s*\S.*'
    terminal: true
    meaning: Binding decision from the Lead persona after escalation.

  CONSENSUS-REACHED:
    marker: CONSENSUS-REACHED
    regex: '(?im)^CONSENSUS-REACHED:\s*\S.*\(signees:.*@[a-z0-9-]+.*@[a-z0-9-]+.*\)'
    terminal: true
    meaning: Two or more distinct personas agreed on a decision (stronger than RESOLUTION).

  DECOMPOSE-REQUEST:
    marker: DECOMPOSE-REQUEST
    regex: '(?im)^DECOMPOSE-REQUEST:\s*\S.*'
    terminal: false
    meaning: Explicitly request that an issue be decomposed into sub-tasks.

  SUB-TASK:
    marker: SUB-TASK
    regex: '(?im)^SUB-TASK:\s*\S.*'
    terminal: false
    meaning: One sub-task within a decomposition plan (title; effort/depends-on/assignee optional).

  DECOMPOSITION-PLAN:
    marker: DECOMPOSITION-PLAN
    regex: '(?im)^DECOMPOSITION-PLAN:'
    terminal: false
    meaning: A plan listing at least two SUB-TASK items for an epic.

  TEST-REPORT:
    marker: TEST-REPORT
    regex: '(?im)^TEST-REPORT:\s*(Pass|Fail)\b'
    terminal: false
    meaning: Test-suite result for an epic in the testing phase (Pass or Fail).

  PHASE-CHANGE:
    marker: PHASE-CHANGE
    regex: '(?im)^PHASE-CHANGE:\s*\S.*'
    terminal: false
    meaning: Records a phase transition (from -> to) for the lifecycle audit log.

# Phase-lifecycle labels (single source of phase truth). These are GitHub label
# names, not body markers — referenced by simulation/tools/state_analyzer for
# the five-phase feature lifecycle (Planning -> Implementation -> Testing ->
# Acceptance -> Done). REQUEST-APPROVAL-FROM (a request marker) doubles as the
# human approval gate at the end of Planning and before Done.
phase_labels:
  planning: "phase/planning"
  implementation: "phase/implementation"
  testing: "phase/testing"
  acceptance: "phase/acceptance"
  done: "phase/done"
