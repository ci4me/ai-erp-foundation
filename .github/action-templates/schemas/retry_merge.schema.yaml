action: retry_merge
required_markers:
  - marker: "RETRY-MERGE"
    allowed_values: [QUEUED, EXHAUSTED]
required_sections:
  - heading: "Last failure"
    min_length: 10
  - heading: "Why retry is safe"
    min_length: 20
post_action_checks:
  - type: pr_merged
    params:
      require_merge_commit_sha: true
