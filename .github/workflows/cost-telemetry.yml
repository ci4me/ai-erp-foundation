name: Cost Telemetry

# Weekly + on-demand rollup of LLM spend across the persona scorecards.
# Reads simulation/scorecards/*.json and updates a tracking issue with
# per-persona / per-scenario cost totals. Fails the run when the rolling
# 7-day spend exceeds the configured budget so Cora's circuit breaker is
# mechanical, not aspirational.
#
# Closes Theme C (sub-issue #6) cost-telemetry condition. Closes
# Cora's APPROVE_WITH_CONDITIONS on Discussion #2.

on:
  schedule:
    # Every Monday at 09:00 UTC. Weekly rollup posts when this fires.
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      weekly_budget_usd:
        description: 'Org-wide weekly spend ceiling (USD). Run FAILS over this.'
        required: true
        default: '50.00'
        type: string
      tracking_issue:
        description: 'Issue number to update with the rollup'
        required: true
        default: '19'
        type: string

permissions:
  contents: read
  issues: write

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install pyyaml==6.0.2

      - name: Compute rollup
        id: rollup
        env:
          WEEKLY_BUDGET_USD: ${{ inputs.weekly_budget_usd || '50.00' }}
        run: python simulation/cost_rollup.py --budget "$WEEKLY_BUDGET_USD" --output rollup.md

      - name: Update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.tracking_issue || '19' }}
        run: |
          if [ ! -s rollup.md ]; then
            echo "rollup.md missing or empty; skipping comment."
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file rollup.md \
            -R "${{ github.repository }}"

      - name: Fail if over budget
        if: steps.rollup.outputs.over_budget == 'true'
        run: |
          echo "::error::Weekly LLM spend exceeded budget. See rollup.md on the tracking issue."
          exit 1
