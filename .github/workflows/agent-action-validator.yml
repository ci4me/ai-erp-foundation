name: Agent Action Validator

on:
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]
  discussion:
    types: [created, edited, answered]
  discussion_comment:
    types: [created, edited]

permissions:
  contents: read

jobs:
  validate-agent-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Extract event body
        id: extract
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ['EVENT_PATH']).read_text())
          body = ''
          source = 'none'
          for key in ('comment', 'review', 'discussion', 'issue'):
              value = event.get(key)
              if isinstance(value, dict) and value.get('body'):
                  body = value['body']
                  source = key
                  break
          Path('agent-action-body.md').write_text(body)
          should_validate = any(
              marker in body
              for marker in (
                  'Persona:',
                  'ACCEPTANCE-DECISION:',
                  'DISCUSSION-STATE:',
                  'ISSUE-STATE:',
                  '**Verdict:**',
              )
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'source={source}\n')
              out.write(f'should_validate={str(should_validate).lower()}\n')
          print(f'source={source}')
          print(f'should_validate={should_validate}')
          PY

      - name: Validate agent action body
        if: steps.extract.outputs.should_validate == 'true'
        run: |
          python -m simulation.tools.validate_agent_action --kind auto --file agent-action-body.md --json

      - name: Skip non-agent human body
        if: steps.extract.outputs.should_validate != 'true'
        run: echo "No agent marker found; skipping validation."
