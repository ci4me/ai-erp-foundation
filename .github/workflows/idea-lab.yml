name: Idea Lab

# Brainstorm surface — Nova (Idea Generator) emits 5 divergent ideas per
# session as Discussion threads in the "Idea Lab" category. Monthly cron
# + manual dispatch. Hard cost cap $2/session, $10/month.
#
# See docs/idea-lab.md for the full flow + anti-spam guards.
# See .github/agent-prompts/nova-idea-generator.md for Nova's prompt.

on:
  schedule:
    # First of each month at 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate            # Nova emits 5 new ideas
          - promote             # Mara promotes a specific Discussion to Issue
          - cleanup             # Auto-close stale ideas (>30 days, no reactions)
      target_discussion_url:
        description: 'For mode=promote: the Discussion URL to convert'
        required: false
        type: string
      session_budget_usd:
        description: 'Hard cap per session (Cora). Default $2.00.'
        required: true
        default: '2.00'
        type: string

permissions:
  contents: read
  issues: write
  discussions: write
  pull-requests: write

jobs:
  generate:
    if: ${{ (github.event_name == 'schedule') || (inputs.mode == 'generate') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r simulation/requirements.txt

      - name: Pre-flight cost check
        env:
          SESSION_BUDGET_USD: ${{ inputs.session_budget_usd || '2.00' }}
        run: |
          echo "Per-session ceiling: $$SESSION_BUDGET_USD"
          # TODO: read .cost_ledger.jsonl (Cora's #27) and refuse if month-to-date
          # Idea Lab spend > $10.00. Stubbed until #27 lands.

      - name: Run Nova session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SESSION_BUDGET_USD: ${{ inputs.session_budget_usd || '2.00' }}
          # Hard wired: max 5 ideas per session, Sonnet model, tiny context
          NOVA_MAX_IDEAS: '5'
          NOVA_MODEL: 'claude-sonnet-4-6'
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY unset — Nova session skipped (dry-run only)"
            exit 0
          fi
          # TODO: implement simulation/tools/nova_session.py once #23 (ready_gate)
          # + #24 (loop_journal) ship. Until then this is a scaffolded workflow.
          echo "Nova session would dispatch here. Awaiting nova_session.py implementation."

  promote:
    if: ${{ inputs.mode == 'promote' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify caller is product-owner
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" != "ci4me" ]; then
            echo "::error::Only product-owners can promote ideas. Actor=$ACTOR not in allow-list."
            exit 1
          fi

      - name: Convert Discussion to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCUSSION_URL: ${{ inputs.target_discussion_url }}
        run: |
          # TODO: parse DISCUSSION_URL, fetch Discussion body via gh api,
          # create Issue via gh issue create with feature.yml template.
          # Stubbed pending feature.yml template (Phase-1 sub-issue).
          echo "Promotion flow scaffolded. Pending feature.yml template."

  cleanup:
    if: ${{ (github.event_name == 'schedule') || (inputs.mode == 'cleanup') }}
    runs-on: ubuntu-latest
    steps:
      - name: Close stale ideas (> 30 days, no reactions)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # TODO: query Discussions in Idea Lab category, find ones >30 days
          # old with <1 human reaction, label idea:didnt-stick and close.
          # Stubbed pending Idea Lab category creation in repo settings.
          echo "Cleanup flow scaffolded. Pending Idea Lab Discussion category."
